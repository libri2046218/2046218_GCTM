services:
  mars-simulator:
    image: mars-iot-simulator:multiarch_v1
    container_name: mars-simulator
    ports:
      - "8081:8080" # Modified port in order to don't interfere with web-engine assignment
    networks:
      - mars-network

  # --- INFRASTRUTTURA: MESSAGE BROKER ---
  activemq-broker:
    image: apache/activemq-classic:latest
    container_name: activemq-broker
    healthcheck:
      # Usiamo nc per verificare che la porta JMS sia pronta
      test: ["CMD", "curl", "-f", "--user", "admin:admin", "http://localhost:8161/admin/"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "61616:61616"
      - "5672:5672"
      - "8161:8161"
    networks:
      - mars-network
